<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASAR — Leaderboard</title>
<link rel="stylesheet" href="css/global.css">
<style>
.page-wrap{max-width:800px;margin:0 auto;padding:40px 20px;position:relative;z-index:1}

/* ── Header ── */
.lb-header{text-align:center;margin-bottom:40px}
.lb-title{font-size:36px;font-weight:900;margin-bottom:8px}
.lb-sub{color:rgba(255,255,255,0.45);font-size:15px}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:28px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:15px;outline:none;transition:border-color 0.3s}
.search-input:focus{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.06)}
.search-input::placeholder{color:rgba(255,255,255,0.25)}

/* ── Podium ── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:40px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;max-width:160px}
.podium-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:20px;border:3px solid transparent;position:relative}
.podium-crown{position:absolute;top:-18px;font-size:20px}
.podium-1 .podium-avatar{width:72px;height:72px;background:linear-gradient(135deg,#f59e0b,#d97706);border-color:#fbbf24}
.podium-2 .podium-avatar{width:60px;height:60px;background:linear-gradient(135deg,#6b7280,#4b5563);border-color:#9ca3af}
.podium-3 .podium-avatar{width:54px;height:54px;background:linear-gradient(135deg,#92400e,#78350f);border-color:#b45309}
.podium-name{font-size:13px;font-weight:700;text-align:center;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-xp{font-size:12px;color:rgba(255,255,255,0.5)}
.podium-base{width:100%;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.podium-1 .podium-base{height:80px;background:linear-gradient(135deg,rgba(245,158,11,0.25),rgba(217,119,6,0.15));border:1px solid rgba(245,158,11,0.3)}
.podium-2 .podium-base{height:60px;background:linear-gradient(135deg,rgba(107,114,128,0.2),rgba(75,85,99,0.1));border:1px solid rgba(107,114,128,0.25)}
.podium-3 .podium-base{height:44px;background:linear-gradient(135deg,rgba(146,64,14,0.2),rgba(120,53,15,0.1));border:1px solid rgba(146,64,14,0.25)}

/* ── Table ── */
.lb-table{width:100%;border-collapse:separate;border-spacing:0 8px}
.lb-table thead th{font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.8px;padding:0 16px 8px;text-align:left}
.lb-table thead th:last-child{text-align:right}
.lb-row{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all 0.3s;cursor:default}
.lb-row:hover{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2);transform:translateX(4px)}
.lb-row.is-me{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.35)}
.lb-row td{padding:14px 16px;vertical-align:middle}
.lb-row td:first-child{border-radius:12px 0 0 12px}
.lb-row td:last-child{border-radius:0 12px 12px 0;text-align:right}
.rank-cell{font-size:16px;font-weight:800;width:50px}
.player-cell{display:flex;align-items:center;gap:12px}
.player-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.player-name{font-weight:600;font-size:15px}
.player-grade{font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px}
.xp-cell{font-size:16px;font-weight:800;color:#fbbf24}
.xp-sub{font-size:11px;color:rgba(255,255,255,0.3);font-weight:400}
.me-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;background:rgba(99,102,241,0.3);color:#a5b4fc;border:1px solid rgba(99,102,241,0.4);margin-left:8px}

/* ── Empty / Loading ── */
.lb-loading{text-align:center;padding:60px 20px}
.lb-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:15px}

/* ── My Rank Card ── */
.my-rank-card{padding:18px 24px;border-radius:16px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.my-rank-info{display:flex;align-items:center;gap:14px}
.my-rank-label{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.my-rank-val{font-size:22px;font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── Refresh btn ── */
.refresh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.last-updated{font-size:12px;color:rgba(255,255,255,0.3)}

@media(max-width:600px){
  .podium{gap:8px}
  .player-grade{display:none}
  .lb-table thead{display:none}
  .my-rank-card{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="grid-overlay"></div>
<div id="toast"></div>

<!-- ── Navbar ── -->
<nav>
  <a class="nav-logo" href="index.html">⚡ ASAR</a>
  <div class="nav-links">
    <a href="quiz.html">🎯 <span>Quiz</span></a>
    <a href="leaderboard.html" class="active">🏆 <span>Leaderboard</span></a>
    <a href="profile.html">👤 <span>Profile</span></a>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="font-size:13px;color:rgba(255,255,255,0.5)">XP: <span id="navXP" style="color:#fbbf24;font-weight:700">0</span></div>
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700" id="navAvatar">?</div>
  </div>
</nav>

<div class="page-wrap">

  <!-- Header -->
  <div class="lb-header">
    <div class="lb-title grad-text">🏆 Leaderboard</div>
    <div class="lb-sub">Top students ranked by XP — updated live</div>
  </div>

  <!-- My Rank Card -->
  <div class="my-rank-card" id="myRankCard" style="display:none">
    <div class="my-rank-info">
      <div style="width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800" id="myRankAvatar">?</div>
      <div>
        <div class="my-rank-label">Your Rank</div>
        <div class="my-rank-val" id="myRankNum">#—</div>
      </div>
    </div>
    <div style="text-align:center">
      <div class="my-rank-label">Your XP</div>
      <div style="font-size:22px;font-weight:900;color:#fbbf24" id="myXPVal">0</div>
    </div>
    <div style="text-align:center">
      <div class="my-rank-label">Level</div>
      <div style="font-size:15px;font-weight:700" id="myLevel">—</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput"
      placeholder="Search students by name or username..."
      oninput="filterTable()">
  </div>

  <!-- Refresh row -->
  <div class="refresh-row">
    <div class="last-updated" id="lastUpdated">Loading...</div>
    <button class="btn btn-outline btn-sm" onclick="loadLeaderboard()">🔄 Refresh</button>
  </div>

  <!-- Podium (top 3) -->
  <div id="podiumSection" style="display:none">
    <div class="podium" id="podium"></div>
  </div>

  <!-- Table -->
  <div id="lbContent">
    <div class="lb-loading">
      <div class="spinner"></div>
      <div style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:8px">Loading leaderboard...</div>
    </div>
  </div>

</div>

<script type="module">
import { requireLogin, getSession } from './js/auth.js';
import { fetchLeaderboard, getRankBadge, getXPLevel } from './js/leaderboard.js';

const user = requireLogin();
if (!user) throw new Error('Not logged in');

// Navbar
document.getElementById('navXP').textContent     = user.xp || 0;
document.getElementById('navAvatar').textContent = (user.name||'G')[0].toUpperCase();

let allRows = [];

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Load Leaderboard ──
window.loadLeaderboard = async () => {
  document.getElementById('lbContent').innerHTML = `
    <div class="lb-loading">
      <div class="spinner"></div>
      <div style="color:rgba(255,255,255,0.4);font-size:14px;margin-top:8px">Fetching rankings...</div>
    </div>`;
  document.getElementById('podiumSection').style.display = 'none';

  try {
    allRows = await fetchLeaderboard(50);

    // My rank
    const myRank = allRows.findIndex(r => r.uid === user.uid) + 1;
    if (myRank > 0 && user.role !== 'guest') {
      const lvl = getXPLevel(user.xp || 0);
      document.getElementById('myRankCard').style.display  = 'flex';
      document.getElementById('myRankAvatar').textContent  = (user.name||'?')[0].toUpperCase();
      document.getElementById('myRankNum').textContent     = '#' + myRank;
      document.getElementById('myXPVal').textContent       = user.xp || 0;
      document.getElementById('myLevel').textContent       = lvl.level;
      document.getElementById('myLevel').style.color       = lvl.color;
    }

    renderPodium(allRows.slice(0,3));
    renderTable(allRows);
    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('lbContent').innerHTML =
      '<div class="lb-empty">❌ Failed to load leaderboard. Try refreshing.</div>';
    console.error(e);
  }
};

// ── Render Podium ──
function renderPodium(top3) {
  if (top3.length < 1) return;
  document.getElementById('podiumSection').style.display = 'block';

  // Order: 2nd, 1st, 3rd
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  const classes = top3[1] ? ['podium-2','podium-1','podium-3'] : ['podium-1'];
  const ranks   = top3[1] ? [2,1,3] : [1];
  const crowns  = ['','👑',''];

  document.getElementById('podium').innerHTML = order.map((p,i) => {
    const cls  = classes[i];
    const rank = ranks[i];
    const lvl  = getXPLevel(p.xp||0);
    return `
    <div class="podium-item $${cls}">
      <div class="podium-avatar" style="position:relative">
        $${crowns[i] ? `<span class="podium-crown">$${crowns[i]}</span>` : ''}
        $${(p.name||'?')[0].toUpperCase()}
      </div>
      <div class="podium-name">$${p.name||p.username||'Student'}</div>
      <div class="podium-xp" style="color:$${lvl.color}">$${lvl.level}</div>
      <div class="podium-base">$${getRankBadge(rank)}</div>
    </div>`;
  }).join('');
}

// ── Render Table ──
function renderTable(rows) {
  if (rows.length === 0) {
    document.getElementById('lbContent').innerHTML =
      '<div class="lb-empty">🏜️ No students yet. Be the first to take a quiz!</div>';
    return;
  }

  const html = `
  <table class="lb-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Student</th>
        <th>Level</th>
        <th>XP</th>
      </tr>
    </thead>
    <tbody>
      $${rows.map((p,i) => {
        const isMe = p.uid === user.uid;
        const lvl  = getXPLevel(p.xp||0);
        const rank = i + 1;
        return `
        <tr class="lb-row $${isMe?'is-me':''}">
          <td class="rank-cell">$${getRankBadge(rank)}</td>
          <td>
            <div class="player-cell">
              <div class="player-avatar"
                style="$${isMe?'border:2px solid #6366f1':''}">
                $${(p.name||'?')[0].toUpperCase()}
              </div>
              <div>
                <div class="player-name">
                  $${p.name||p.username||'Student'}
                  $${isMe?'<span class="me-tag">YOU</span>':''}
                </div>
                <div class="player-grade">@$${p.username||'—'} $${p.grade?'· '+p.grade:''}</div>
              </div>
            </div>
          </td>
          <td>
            <span class="badge" style="background:$${lvl.color}22;color:$${lvl.color};border:1px solid $${lvl.color}44">
              $${lvl.level}
            </span>
          </td>
          <td class="xp-cell">
            $${(p.xp||0).toLocaleString()}
            <div class="xp-sub">XP</div>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('lbContent').innerHTML = html;
}

// ── Filter / Search ──
window.filterTable = () => {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderTable(allRows); return; }
  const filtered = allRows.filter(p =>
    (p.name||'').toLowerCase().includes(q) ||
    (p.username||'').toLowerCase().includes(q) ||
    (p.grade||'').toLowerCase().includes(q)
  );
  renderTable(filtered);
};

// ── Init ──
loadLeaderboard();
</script>
</body>
</html>
