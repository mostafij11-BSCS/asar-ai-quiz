<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asar AI Quiz System</title>
    <!-- Load FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS STYLES */
        :root {
            --navy-primary: #001f3f;
            --cyan-accent: #00d4ff;
            --white: #ffffff;
            --gray-light: #f8f9fa;
            --gray-medium: #6c757d;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --shadow: 0 4px 15px rgba(0, 31, 63, 0.1);
            --shadow-hover: 0 8px 25px rgba(0, 212, 255, 0.2);
        }

        body {
            background-color: var(--gray-light);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        .asar-quiz-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .asar-section-header { text-align: center; margin-bottom: 3rem; }
        
        .asar-section-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--navy-primary);
            margin-bottom: 1rem;
        }

        .asar-section-subtitle {
            font-size: 1.2rem;
            color: var(--gray-medium);
            max-width: 600px;
            margin: 0 auto;
        }

        .asar-grid {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .asar-grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .asar-grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .asar-grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }

        .asar-card {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #eee;
            position: relative;
            overflow: hidden;
        }

        .asar-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--cyan-accent);
        }

        /* Class Cards */
        .asar-class-card { text-align: center; }
        .asar-class-number { font-size: 3rem; font-weight: 800; color: var(--cyan-accent); margin-bottom: 0.5rem; }
        .asar-card-title { font-size: 1.4rem; font-weight: 600; color: var(--navy-primary); margin: 0 0 10px 0; }
        .asar-card-description { color: var(--gray-medium); line-height: 1.6; font-size: 0.95rem; }

        /* Subject Cards */
        .asar-card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .asar-card-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; background: var(--navy-primary);
        }

        /* Chapter Cards */
        .asar-difficulty-badge {
            display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 500; text-transform: uppercase;
        }
        .asar-difficulty-easy { background: rgba(40, 167, 69, 0.1); color: var(--success); }
        .asar-difficulty-medium { background: rgba(255, 193, 7, 0.1); color: var(--warning); }
        .asar-difficulty-hard { background: rgba(220, 53, 69, 0.1); color: var(--danger); }
        
        .asar-card-meta { display: flex; gap: 1rem; font-size: 0.9rem; color: var(--gray-medium); margin-top: 1.5rem; }
        .asar-card-meta i { color: var(--cyan-accent); }

        /* Navigation */
        .asar-breadcrumb {
            background: var(--navy-primary); color: white;
            padding: 1rem 2rem; border-radius: 12px; margin-bottom: 2rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .breadcrumb-separator { color: var(--cyan-accent); }

        .asar-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem; border-radius: 25px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; border: none; font-size: 1rem;
        }
        .asar-btn-primary { background: var(--cyan-accent); color: var(--navy-primary); }
        .asar-btn-primary:hover { background: #00b8e6; transform: translateY(-2px); }
        .asar-btn-outline { background: transparent; color: var(--navy-primary); border: 2px solid var(--navy-primary); }
        .asar-btn-outline:hover { background: var(--navy-primary); color: white; }
        .asar-nav-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; }

        /* Start Quiz Area */
        .asar-quiz-start {
            background: var(--navy-primary); color: white;
            padding: 3rem; border-radius: 20px; text-align: center;
        }
        .upload-area {
            border: 2px dashed var(--cyan-accent); border-radius: 12px;
            padding: 2rem; margin: 2rem auto; max-width: 500px;
            background: rgba(0, 212, 255, 0.05); cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { background: rgba(0, 212, 255, 0.1); }
        .upload-icon { font-size: 3rem; color: var(--cyan-accent); margin-bottom: 1rem; }
    </style>
</head>
<body>

<div id="asar-quiz-selector" class="asar-quiz-container">
    <!-- Content injected by JS -->
</div>

<script>
    // JAVASCRIPT LOGIC
    const container = document.getElementById('asar-quiz-selector');
    let selectedData = { class: null, subject: null, chapter: null };

    // --- DATA ---
    const data = {
        classes: [
            { id: 9, number: 9, name: 'Class 9', desc: 'Secondary school foundation' },
            { id: 10, number: 10, name: 'Class 10', desc: 'Secondary school board' },
            { id: 11, number: 11, name: 'Class 11', desc: 'Higher secondary' },
            { id: 12, number: 12, name: 'Class 12', desc: 'Pre-university level' }
        ],
        subjects: [
            { id: 1, name: 'Mathematics', icon: 'fas fa-calculator' },
            { id: 2, name: 'Science', icon: 'fas fa-flask' },
            { id: 3, name: 'English', icon: 'fas fa-book-open' }
        ],
        chapters: [
            { id: 1, name: 'Real Numbers', diff: 'medium', q: 10 },
            { id: 2, name: 'Polynomials', diff: 'hard', q: 15 },
            { id: 3, name: 'Linear Equations', diff: 'easy', q: 8 }
        ]
    };

    // --- RENDER FUNCTIONS ---
    function renderClasses() {
        let html = `
            <div class="asar-section-header">
                <h2 class="asar-section-title">Choose Your Class</h2>
                <p class="asar-section-subtitle">Select your academic class to start your AI-powered learning journey</p>
            </div>
            <div class="asar-grid asar-grid-4">
        `;
        data.classes.forEach(c => {
            html += `
                <div class="asar-card asar-class-card" onclick="selectClass('$${c.name}')">
                    <div class="asar-class-number">$${c.number}</div>
                    <h3 class="asar-card-title">$${c.name}</h3>
                    <p class="asar-card-description">$${c.desc}</p>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function renderSubjects() {
        let html = `
            <div class="asar-breadcrumb">
                <div><i class="fas fa-graduation-cap"></i> $${selectedData.class}</div>
                <span class="breadcrumb-separator">›</span>
                <div>Choose Subject</div>
            </div>
            <div class="asar-section-header">
                <h2 class="asar-section-title">Select Subject</h2>
            </div>
            <div class="asar-grid asar-grid-3">
        `;
        data.subjects.forEach(s => {
            html += `
                <div class="asar-card" onclick="selectSubject('$${s.name}')">
                    <div class="asar-card-header">
                        <div class="asar-card-icon"><i class="$${s.icon}"></i></div>
                        <h3 class="asar-card-title">$${s.name}</h3>
                    </div>
                </div>
            `;
        });
        html += `</div>
        <div class="asar-nav-buttons"><button class="asar-btn asar-btn-outline" onclick="renderClasses()"><i class="fas fa-arrow-left"></i> Back</button></div>`;
        container.innerHTML = html;
    }

    function renderChapters() {
        let html = `
            <div class="asar-breadcrumb">
                <div><i class="fas fa-graduation-cap"></i> $${selectedData.class}</div>
                <span class="breadcrumb-separator">›</span>
                <div><i class="fas fa-book"></i> $${selectedData.subject}</div>
                <span class="breadcrumb-separator">›</span>
                <div>Choose Chapter</div>
            </div>
            <div class="asar-grid asar-grid-2">
        `;
        data.chapters.forEach(c => {
            html += `
                <div class="asar-card" onclick="selectChapter('$${c.name}')">
                    <h3 class="asar-card-title">$${c.name}</h3>
                    <span class="asar-difficulty-badge asar-difficulty-$${c.diff}">$${c.diff}</span>
                    <div class="asar-card-meta">
                        <div><i class="fas fa-question-circle"></i> $${c.q} questions</div>
                    </div>
                </div>
            `;
        });
        html += `</div>
        <div class="asar-nav-buttons"><button class="asar-btn asar-btn-outline" onclick="renderSubjects()"><i class="fas fa-arrow-left"></i> Back</button></div>`;
        container.innerHTML = html;
    }

    function renderQuizStart() {
        container.innerHTML = `
            <div class="asar-breadcrumb">
                <div>$${selectedData.class}</div> <span class="breadcrumb-separator">›</span>
                <div>$${selectedData.subject}</div> <span class="breadcrumb-separator">›</span>
                <div>$${selectedData.chapter}</div>
            </div>
            
            <div class="asar-quiz-start">
                <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Ready to Generate AI Quiz?</h2>
                <p style="color: var(--cyan-accent); font-size: 1.2rem;">Chapter: ${selectedData.chapter}</p>
                
                <div class="upload-area" onclick="document.getElementById('file-upload').click()">
                    <i class="fas fa-file-pdf upload-icon"></i>
                    <h3>Upload Chapter PDF</h3>
                    <p style="color: var(--gray-medium);">Click to browse files. The AI will read the PDF to generate the quiz.</p>
                    <input type="file" id="file-upload" style="display: none;" accept=".pdf">
                </div>

                <div class="asar-nav-buttons">
                    <button class="asar-btn asar-btn-outline" style="color: white; border-color: white;" onclick="renderChapters()">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button class="asar-btn asar-btn-primary" onclick="alert('In a real app, this would send the PDF to the AI and start the quiz!')">
                        <i class="fas fa-robot"></i> Generate Quiz
                    </button>
                </div>
            </div>
        `;
    }

    // --- ACTIONS ---
    function selectClass(c) { selectedData.class = c; renderSubjects(); }
    function selectSubject(s) { selectedData.subject = s; renderChapters(); }
    function selectChapter(c) { selectedData.chapter = c; renderQuizStart(); }

    // Start App
    renderClasses();
</script>
</body>
</html>
